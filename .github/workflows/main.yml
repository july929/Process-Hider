name: Build Process-Hider.exe

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions: write-all
    
    steps:
      # Step 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: 'true'

      # Step 2: 设置 MSVC 编译环境
      - name: Setup MSVC compiler
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Step 3: 构建 EXE 文件
      - name: Build executable
        run: |
          # 显示目录结构
          echo "Current directory:"
          dir
          echo "Process-Hider subdirectory:"
          dir Process-Hider
          
          # 直接构建解决方案文件（使用完整路径）
          msbuild Process-Hider.sln /p:Configuration=Release /p:Platform=x64 /p:OutDir=.\build_output\
          
          # 创建 artifacts 目录
          mkdir artifacts -ErrorAction SilentlyContinue
          
          # 从标准输出目录查找生成的 exe
          $exePaths = @(
            ".\build_output\Process-Hider.exe",
            ".\x64\Release\Process-Hider.exe",
            ".\Release\Process-Hider.exe",
            ".\Process-Hider\Release\Process-Hider.exe"
          )
          
          $found = $false
          foreach ($path in $exePaths) {
            if (Test-Path $path) {
              Copy-Item $path -Destination .\artifacts\
              echo "Found and copied: $path"
              $found = $true
              break
            }
          }
          
          # 如果没找到，尝试递归搜索
          if (-not $found) {
            $exe = Get-ChildItem -Recurse -Filter "Process-Hider.exe" | Select-Object -First 1
            if ($exe) {
              Copy-Item $exe.FullName -Destination .\artifacts\
              echo "Found and copied via search: $($exe.FullName)"
              $found = $true
            }
          }
          
          if (-not $found) {
            Write-Error "Process-Hider.exe not found!"
            exit 1
          }

      # Step 4: 列出 artifacts 内容
      - name: List artifacts
        run: |
          echo "Generated files:"
          dir artifacts

      # Step 5: 上传工件
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Process-Hider-x64
          path: artifacts/*

      # Step 6: 获取当前时间
      - name: Get current time
        id: current-time
        uses: josStorer/get-current-time@v2.0.2
        with:
          format: YYYYMMDD-HHmmSS
          utcOffset: "+08:00"

      # Step 7: 创建 GitHub Release
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ format('Process-Hider-v{0}', steps.current-time.outputs.formattedTime) }}
          release_name: ${{ format('Process-Hider Build {0}', steps.current-time.outputs.formattedTime) }}
          body: |
            ## 自动构建
            
            - 时间：${{ steps.current-time.outputs.formattedTime }}
            - 平台：Windows x64
            - 注意：本项目旨在技术研究与合法合规的自动化测试，使用过程中请务必遵守相关软件的用户协议与法律法规。
            
            ### 使用说明
            1. 以管理员身份运行 `Process-Hider.exe`
            2. 程序将会自动隐藏`同步专家远程版`、`同步专家网吧版`、`向日葵远程`、`网易UU远程`、`连连控`、`Todesk`
            2. 按下键盘的 `END` 键停止隐藏进程的程序
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 8: 上传 EXE 文件到 Release
      - name: Upload executable to release
        run: |
          $releaseId = "${{ steps.create_release.outputs.id }}"
          $repo = "${{ github.repository }}"
          $token = "${{ secrets.GITHUB_TOKEN }}"
          
          Get-ChildItem artifacts\*.exe | ForEach-Object {
            $fileName = $_.Name
            $filePath = $_.FullName
            echo "Uploading $fileName to release..."
            
            curl -X POST `
              -H "Authorization: token $token" `
              -H "Content-Type: application/octet-stream" `
              --data-binary "@$filePath" `
              "https://uploads.github.com/repos/$repo/releases/$releaseId/assets?name=$fileName"
          }
